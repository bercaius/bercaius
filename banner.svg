<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <clipPath id="square-clip">
      <rect x="25" y="25" width="250" height="250" rx="40" />
    </clipPath>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D5FF" />
      <stop offset="50%" stop-color="#E4E7EC" />
      <stop offset="100%" stop-color="#00D5FF" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <style>
    .rotate-frame {
      transform-origin: 150px 150px;
      animation: spin 5s linear infinite;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .pulse {
      animation: pulse 2s ease-in-out infinite alternate;
    }
    @keyframes pulse {
      0% { opacity: 0.8; filter: drop-shadow(0px 0px 5px #00D5FF); }
      100% { opacity: 1; filter: drop-shadow(0px 0px 15px #00D5FF); }
    }
  </style>

  <!-- Base back square -->
  <rect x="25" y="25" width="250" height="250" rx="40" fill="#0D1117" />
  
  <!-- Profile Image -->
  <image href="data:image/jpeg;base64," x="0" y="0" width="300" height="300" clip-path="url(#square-clip)" preserveAspectRatio="xMidYMid slice" />
  
  <!-- Animated Frame -->
  <rect x="20" y="20" width="260" height="260" rx="45" fill="none" stroke="url(#glow-grad)" stroke-width="5" stroke-dasharray="140 120" class="rotate-frame pulse" filter="url(#glow)" />
</svg>